# Nginx vhost for foundry.cloudcraft.ro — draft (installed in Phase 10).
# Topology: Cloudflare (proxied DNS) -> this vhost -> controller on
# 127.0.0.1:8400. Docs: docs/DEPLOYMENT.md § Nginx + Cloudflare Notes.
#
# Frontend serving model (embedded vs static root) is decided in
# Phase 8; until then everything proxies to the controller.

# Rate limits: auth + enrollment are the brute-forceable endpoints.
limit_req_zone $binary_remote_addr zone=foundry_auth:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=foundry_enroll:10m rate=6r/m;

# ── Cloudflare real client IPs ──────────────────────────────────────
# Audit logs record real IPs (docs/SECURITY.md). Refresh this list from
# https://www.cloudflare.com/ips/ when Cloudflare updates it.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

upstream foundry_controller {
    server 127.0.0.1:8400;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name foundry.cloudcraft.ro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name foundry.cloudcraft.ro;

    # TLS: Let's Encrypt or a Cloudflare origin certificate — pick at
    # install time (Cloudflare proxy fronts either way).
    ssl_certificate     /etc/letsencrypt/live/foundry.cloudcraft.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foundry.cloudcraft.ro/privkey.pem;

    # /metrics stays private (docs/SECURITY.md).
    location = /metrics { return 404; }

    location /auth/ {
        limit_req zone=foundry_auth burst=10 nodelay;
        proxy_pass http://foundry_controller;
        include /etc/nginx/snippets/foundry-proxy-headers.conf;
    }

    location = /agent/enroll {
        limit_req zone=foundry_enroll burst=3 nodelay;
        proxy_pass http://foundry_controller;
        include /etc/nginx/snippets/foundry-proxy-headers.conf;
    }

    # Agent long-poll (tasks/next) + future SSE log streaming need long
    # read timeouts and upgrade headers.
    location /agent/ {
        proxy_pass http://foundry_controller;
        include /etc/nginx/snippets/foundry-proxy-headers.conf;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://foundry_controller;
        include /etc/nginx/snippets/foundry-proxy-headers.conf;
    }
}
