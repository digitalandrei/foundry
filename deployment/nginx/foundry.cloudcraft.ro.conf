# Nginx vhost for foundry.cloudcraft.ro (live since Phase 3).
# Topology: Cloudflare (proxied DNS) -> this vhost -> controller on
# 127.0.0.1:8400. Docs: docs/DEPLOYMENT.md § Nginx + Cloudflare Notes.
#
# Serving model (decided Phase 3): nginx serves the built frontend
# statically from /srv/foundry/frontend; the controller is API-only —
# no rust-embed, no full-rebuild-to-ship-css pain.
# TLS: self-signed origin cert in /etc/nginx/ssl/<domain>/ behind
# Cloudflare "Full" mode — the established pattern on this host.

# Rate limits: auth + enrollment are the brute-forceable endpoints.
limit_req_zone $binary_remote_addr zone=foundry_auth:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=foundry_enroll:10m rate=6r/m;

upstream foundry_controller {
    server 127.0.0.1:8400;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name foundry.cloudcraft.ro;
    return 301 https://$host$request_uri;
}

server {
    # listen-form http2 flag: this host runs nginx 1.24 (no `http2 on;`).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name foundry.cloudcraft.ro;

    ssl_certificate     /etc/nginx/ssl/foundry.cloudcraft.ro/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/foundry.cloudcraft.ro/privkey.pem;

    # Cloudflare real client IPs (server scope — see snippet header).
    include /etc/nginx/snippets/foundry-realip.conf;

    # ── Static frontend (SPA) ───────────────────────────────────────
    root /srv/foundry/frontend;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # ── Controller API ──────────────────────────────────────────────
    # /metrics stays private (docs/SECURITY.md).
    location = /metrics { return 404; }

    location = /health {
        proxy_pass http://foundry_controller;
        include /etc/nginx/snippets/foundry-proxy-headers.conf;
    }

    location /auth/ {
        limit_req zone=foundry_auth burst=10 nodelay;
        proxy_pass http://foundry_controller;
        include /etc/nginx/snippets/foundry-proxy-headers.conf;
    }

    location /api/ {
        proxy_pass http://foundry_controller;
        include /etc/nginx/snippets/foundry-proxy-headers.conf;
    }

    location = /agent/enroll {
        limit_req zone=foundry_enroll burst=3 nodelay;
        proxy_pass http://foundry_controller;
        include /etc/nginx/snippets/foundry-proxy-headers.conf;
    }

    # Agent long-poll (tasks/next) + future SSE log streaming need long
    # read timeouts and upgrade headers.
    location /agent/ {
        proxy_pass http://foundry_controller;
        include /etc/nginx/snippets/foundry-proxy-headers.conf;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
